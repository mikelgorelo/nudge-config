name: Update Nudge JSON and README

on:
  schedule:
    - cron: '0 8 * * *' # Runs every day automatically at 8 AM UTC
  workflow_dispatch: # Allows you to run it manually via the Actions tab

# Use Node 24 to future-proof against the deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch SOFA JSON Feed via cURL
        # We use curl with compression and a custom agent to bypass the Cloudflare WAF
        run: |
          curl -sL --compressed \
          -A "Nudge-Automation-Bot/1.0" \
          "https://sofafeed.macadmins.io/v1/macos_data_feed.json" \
          -o sofa.json

      - name: Run Python Script
        # This generates nudge.json and README.md
        run: python update_nudge.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add both the config and the human-readable readme
          git add nudge.json README.md
          
          # Only commit if there are actually changes to avoid workflow errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of Nudge config and README" && git push)
